name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  plugin:
    name: Build plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: plugin/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: |
            plugin/main.js
            plugin/manifest.json
            plugin/styles.css

  server:
    name: Build server (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          go build -o obsidian-sync-server-${{ matrix.os }}-${{ matrix.arch }}${EXT} .
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.os }}-${{ matrix.arch }}
          path: server/obsidian-sync-server-*

  release-client:
    name: Release client
    needs: plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: plugin
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-client
          name: ${{ github.ref_name }}-client
          files: release/*
          generate_release_notes: false

  release-server:
    name: Release server
    needs: server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          merge-multiple: true
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-server
          name: ${{ github.ref_name }}-server
          files: release/*
          generate_release_notes: false
